<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>فحص مواصفات الجهاز</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma,sans-serif;
}

body{

background:#eef2f7;

}

header{

background:#0d6efd;
color:white;
padding:20px;
text-align:center;
box-shadow:0 4px 10px rgba(0,0,0,.2);

}

header h1{

font-size:30px;

}

main{

width:90%;
max-width:900px;
margin:40px auto;

}

.card{

background:white;
padding:25px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,.1);

}

button{

margin-top:20px;
padding:15px;
width:100%;
background:#0d6efd;
color:white;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;

}

button:hover{

background:#084ec2;

}

.grid{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
gap:15px;
margin-top:25px;

}

.box{

background:#f7f9fc;
padding:20px;
border-radius:12px;
text-align:center;
transition:.3s;

}

.box:hover{

transform:translateY(-5px);

}

.box h3{

color:#0d6efd;
margin-bottom:10px;

}

footer{

margin-top:50px;
background:#222;
color:white;
padding:20px;
text-align:center;

}

</style>

</head>

<body>

<header>

<h1>موقع معرفة مواصفات الجهاز</h1>

<p>تحليل بعض المعلومات التي يسمح المتصفح بالوصول إليها</p>

</header>

<main>

<div class="card">

<button onclick="deviceInfo()">

عرض مواصفات الجهاز

</button>

<div class="grid">

<div class="box">
<h3>نظام التشغيل</h3>
<p id="os">-</p>
</div>

<div class="box">
<h3>لغة المتصفح</h3>
<p id="lang">-</p>
</div>

<div class="box">
<h3>دقة الشاشة</h3>
<p id="screen">-</p>
</div>

<div class="box">
<h3>عدد الأنوية</h3>
<p id="cpu">-</p>
</div>

<div class="box">
<h3>الذاكرة التقريبية</h3>
<p id="ram">-</p>
</div>

<div class="box">
<h3>المنصة</h3>
<p id="platform">-</p>
</div>

<div class="box">
<h3>اتصال الإنترنت</h3>
<p id="online">-</p>
</div>

<div class="box">
<h3>وكيل المستخدم</h3>
<p id="browser">-</p>
</div>

</div>

</div>

</main>

<footer>

جميع الحقوق محفوظة © 2026

</footer>

<script>

function deviceInfo(){

document.getElementById("os").innerHTML=navigator.userAgent;

document.getElementById("lang").innerHTML=navigator.language;

document.getElementById("screen").innerHTML=
screen.width+" × "+screen.height;

document.getElementById("cpu").innerHTML=
navigator.hardwareConcurrency || "غير متوفر";

document.getElementById("ram").innerHTML=
navigator.deviceMemory ?
navigator.deviceMemory+" GB"
:
"غير مدعوم";

document.getElementById("platform").innerHTML=
navigator.platform;

document.getElementById("online").innerHTML=
navigator.onLine ? "متصل" : "غير متصل";

document.getElementById("browser").innerHTML=
navigator.userAgent;

}

</script>

</body>

</html>
